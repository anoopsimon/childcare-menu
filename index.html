<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Childcare menu today</title>
  <style>
    :root{
      --bg1:#fff8ef;
      --bg2:#fef3f6;
      --text:#24322b;
      --muted:#6f7d74;
      --accent:#2d6a4f;

      --done-bg:#edf8f1;
      --done-border:#cfead9;
      --done-text:#2c7a4b;

      --active-bg:#fff6d9;
      --active-border:#f0df9c;
      --active-text:#8a6408;

      --upcoming-bg:#ffffff;
      --upcoming-border:#ebe3d7;

      --weekend-bg:#fff0f2;
      --weekend-border:#f2cfd6;
      --weekend-text:#a24b5d;

      --veg-bg:#e9f8ec;
      --veg-text:#238245;

      --non-bg:#fde9e9;
      --non-text:#cb3d3d;

      --chip:#f4ede3;
      --chip-text:#647067;

      --toggle-bg:#f5eee4;
      --toggle-active:#ffffff;
      --toggle-border:#eadfce;

      --shadow:0 14px 35px rgba(46,54,49,.08);
      --radius:26px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      margin:0;
      padding:0;
      font-family:Inter, ui-rounded, "SF Pro Rounded", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #fff5d9 0%, transparent 35%),
        radial-gradient(circle at top right, #ffe3ec 0%, transparent 30%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:16px 14px 28px;
    }

    .app{
      width:100%;
      max-width:460px;
    }

    .shell{
      background:rgba(255,255,255,.72);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.85);
      border-radius:32px;
      padding:16px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      width:100%;
    }

    .shell::before,
    .shell::after{
      content:"";
      position:absolute;
      border-radius:999px;
      z-index:0;
      opacity:.45;
      pointer-events:none;
    }

    .shell::before{
      width:160px;
      height:160px;
      background:#ffeab5;
      top:-70px;
      right:-50px;
    }

    .shell::after{
      width:130px;
      height:130px;
      background:#dbf4df;
      left:-55px;
      bottom:90px;
    }

    .top,
    #content,
    .footer-note{
      position:relative;
      z-index:1;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.05em;
      color:var(--muted);
      font-weight:700;
      margin-bottom:10px;
      background:rgba(255,255,255,.75);
      padding:8px 12px;
      border-radius:999px;
      border:1px solid #efe6d8;
      max-width:100%;
    }

    .bubble{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#69b47f;
      box-shadow:0 0 0 4px rgba(105,180,127,.14);
      flex:0 0 auto;
    }

    h1{
      margin:0;
      font-size:29px;
      line-height:1.04;
      letter-spacing:-.04em;
      color:var(--accent);
      font-weight:900;
      max-width:290px;
    }

    .sub{
      margin-top:10px;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      font-weight:600;
    }

    .room-toggle{
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      padding:6px;
      background:var(--toggle-bg);
      border:1px solid var(--toggle-border);
      border-radius:18px;
      width:100%;
    }

    .room-btn{
      appearance:none;
      border:0;
      background:transparent;
      color:#6d786f;
      font-size:14px;
      font-weight:800;
      padding:12px 10px;
      border-radius:14px;
      cursor:pointer;
      transition:all .18s ease;
      min-width:0;
    }

    .room-btn.active{
      background:var(--toggle-active);
      color:var(--accent);
      box-shadow:0 6px 16px rgba(31,42,36,.07);
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-top:16px;
      width:100%;
      min-width:0;
    }

    .btn{
      appearance:none;
      border:1px solid #efe6d8;
      background:#fff;
      color:var(--accent);
      border-radius:18px;
      padding:12px 12px;
      font-size:13px;
      font-weight:800;
      box-shadow:0 8px 20px rgba(31,42,36,.05);
      cursor:pointer;
      flex:0 1 auto;
      min-width:0;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:32%;
    }

    .btn:active,
    .room-btn:active{
      transform:scale(.99);
    }

    .date-pill{
      flex:1 1 auto;
      min-width:0;
      text-align:center;
      padding:10px 8px;
      background:var(--chip);
      color:var(--chip-text);
      border-radius:18px;
      font-size:12px;
      font-weight:800;
      border:1px solid #eee4d6;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .menu-list{
      margin-top:16px;
      display:grid;
      gap:12px;
    }

    .meal{
      border-radius:var(--radius);
      padding:14px 14px 13px;
      border:1px solid var(--upcoming-border);
      background:var(--upcoming-bg);
      box-shadow:0 8px 18px rgba(31,42,36,.03);
    }

    .meal.done{
      background:var(--done-bg);
      border-color:var(--done-border);
    }

    .meal.active{
      background:var(--active-bg);
      border-color:var(--active-border);
    }

    .meal-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .meal-heading{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .meal-icon{
      width:40px;
      height:40px;
      border-radius:14px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      background:#fff8ea;
      border:1px solid #f2e7d5;
      flex:0 0 auto;
    }

    .meal-title-wrap{
      min-width:0;
    }

    .meal-title{
      font-size:16px;
      font-weight:900;
      letter-spacing:-.02em;
      line-height:1.15;
    }

    .meal-subtitle{
      margin-top:2px;
      font-size:12px;
      color:var(--muted);
      font-weight:700;
    }

    .meal-status{
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.06em;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.75);
      white-space:nowrap;
      flex:0 0 auto;
    }

    .meal.done .meal-status{
      color:var(--done-text);
    }

    .meal.active .meal-status{
      color:var(--active-text);
    }

    .meal:not(.done):not(.active) .meal-status{
      color:#607067;
    }

    .meal-tags{
      display:flex;
      gap:6px;
      margin:0 0 8px 50px;
      flex-wrap:wrap;
    }

    .tag{
      font-size:10px;
      font-weight:900;
      padding:5px 8px;
      border-radius:999px;
      letter-spacing:.05em;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .tag.veg{
      background:var(--veg-bg);
      color:var(--veg-text);
    }

    .tag.non{
      background:var(--non-bg);
      color:var(--non-text);
    }

    .meal-main{
      font-size:15px;
      line-height:1.45;
      font-weight:800;
      margin-left:50px;
    }

    .meal-extra{
      margin-top:6px;
      font-size:13px;
      line-height:1.45;
      color:#5f6b64;
      margin-left:50px;
      font-weight:600;
    }

    .empty{
      padding:28px 18px;
      border-radius:28px;
      text-align:center;
      background:var(--weekend-bg);
      border:1px solid var(--weekend-border);
      color:var(--weekend-text);
      margin-top:16px;
      box-shadow:0 8px 20px rgba(162,75,93,.05);
    }

    .empty .empty-icon{
      font-size:34px;
      margin-bottom:8px;
    }

    .empty h2{
      margin:0 0 8px;
      font-size:20px;
      letter-spacing:-.02em;
      font-weight:900;
    }

    .empty p{
      margin:0;
      font-size:14px;
      line-height:1.5;
      font-weight:700;
    }

    .footer-note{
      margin-top:16px;
      padding:12px 14px;
      font-size:12px;
      line-height:1.45;
      color:var(--muted);
      background:rgba(255,255,255,.65);
      border:1px solid #eee7dc;
      border-radius:18px;
      font-weight:700;
    }

    @media (max-width:390px){
      h1{
        font-size:27px;
      }

      .btn{
        font-size:12px;
        padding:11px 10px;
      }

      .date-pill{
        font-size:11px;
        padding:10px 6px;
      }
    }
  </style>
</head>
<body>

          },

          },

          },
          friday: {

            lunch: { main: "Fried rice with tofu", extra: "Peas, capsicum, sweetcorn, beans, rice" },
            afternoonTea: { main: "Fresh seasonal fruits with yoghurt", extra: "Served with water" }
          }
        }
      }
    };

    const KINDER_MENU = JSON.parse(JSON.stringify(PREKINDER_MENU));

    const MENUS = {
      prekinder: PREKINDER_MENU,
      kinder: KINDER_MENU
    };

    const ROOM_LABELS = {
      prekinder: "Pre-Kinder",
      kinder: "Kinder"
    };

    const weekdayNames = ["sunday","monday","tuesday","wednesday","thursday","friday","saturday"];
    const prettyWeekdays = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    // Confirmed by childcare:
    // 16 Mar 2026 Monday = Week 3 Monday
    const CYCLE_CONFIG = {
      cycleStartDate: new Date(2026, 2, 16),
      cycleStartWeek: 3
    };

    let viewOffset = 0;
    let currentRoom = "prekinder";

    function startOfDay(date){
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function addDays(date, days){
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function formatDate(date){
      return new Intl.DateTimeFormat("en-AU", {
        weekday: "short",
        day: "numeric",
        month: "short",
        year: "numeric"
      }).format(date);
    }

    function getRotatingWeekNumber(date){
      const cycleStart = startOfDay(CYCLE_CONFIG.cycleStartDate);
      const target = startOfDay(date);
      const diffDays = Math.floor((target - cycleStart) / 86400000);
      const weekOffset = Math.floor(diffDays / 7);
      const startWeekIndex = CYCLE_CONFIG.cycleStartWeek - 1;
      const weekIndex = (((startWeekIndex + weekOffset) % 4) + 4) % 4;
      return weekIndex + 1;
    }

    function getMealState(slot, viewedDate, now){
      const viewed = startOfDay(viewedDate).getTime();
      const today = startOfDay(now).getTime();

      if(viewed < today) return "done";
      if(viewed > today) return "upcoming";

      const currentMinutes = now.getHours() * 60 + now.getMinutes();

      const mealEnds = {
        breakfast: 9 * 60,
        morningTea: 10 * 60 + 30,
        lunch: 13 * 60 + 30,
        lunchSide: 13 * 60 + 30,
        afternoonTea: 15 * 60 + 30,
        lateSnack: 17 * 60 + 30
      };

      const mealStarts = {
        breakfast: 7 * 60,
        morningTea: 9 * 60,
        lunch: 11 * 60 + 30,
        lunchSide: 11 * 60 + 30,
        afternoonTea: 14 * 60 + 30,
        lateSnack: 17 * 60
      };

      if(currentMinutes >= mealEnds[slot]) return "done";
      if(currentMinutes >= mealStarts[slot] && currentMinutes < mealEnds[slot]) return "active";
      return "upcoming";
    }

    function stateLabel(state){
      if(state === "done") return "Done";
      if(state === "active") return "Now";
      return "Later";
    }

    function getFoodTag(text){
      const lower = text.toLowerCase();
      const nonVegWords = [
        "chicken","lamb","beef","tuna","fish","basa","mince","fillet","fillets",
        "burger","burgers","ragout","curry","risotto","bolognese"
      ];

      for(const word of nonVegWords){
        if(lower.includes(word)){
          return '<span class="tag non">NON</span>';
        }
      }
      return '<span class="tag veg">VEG</span>';
    }

    function getMealMeta(slot){
      return {
        breakfast: { icon: "🥣", subtitle: "Start of day" },
        morningTea: { icon: "🍎", subtitle: "Morning break" },
        lunch: { icon: "🍽️", subtitle: "Main meal" },
        lunchSide: { icon: "🥪", subtitle: "Side item" },
        afternoonTea: { icon: "🧁", subtitle: "Afternoon break" },
        lateSnack: { icon: "🍘", subtitle: "End of day" }
      }[slot];
    }

    function renderMealCard(slot, title, main, extra, state){
      const tag = getFoodTag((main || "") + " " + (extra || ""));
      const meta = getMealMeta(slot);

      return `
        <article class="meal ${state}">
          <div class="meal-top">
            <div class="meal-heading">
              <div class="meal-icon">${meta.icon}</div>
              <div class="meal-title-wrap">
                <div class="meal-title">${title}</div>
                <div class="meal-subtitle">${meta.subtitle}</div>
              </div>
            </div>
            <div class="meal-status">${stateLabel(state)}</div>
          </div>
          <div class="meal-tags">${tag}</div>
          <div class="meal-main">${main}</div>
          ${extra ? `<div class="meal-extra">${extra}</div>` : ``}
        </article>
      `;
    }

    function renderWeekend(){
      return `
        <div class="empty">
          <div class="empty-icon">🌈</div>
          <h2>No childcare menu today</h2>
          <p>Weekend day. No meals listed on the centre menu.</p>
        </div>
      `;
    }

    function getMenuForDate(date, room){
      const menuSource = MENUS[room];
      const weekdayIndex = date.getDay();
      const dayName = weekdayNames[weekdayIndex];

      if(weekdayIndex === 0 || weekdayIndex === 6){
        return { weekend: true };
      }

      const weekNumber = getRotatingWeekNumber(date);
      const dayMenu = menuSource.weeks[weekNumber][dayName];

      return {
        weekend: false,
        weekNumber,
        meals: [
          {
            slot: "breakfast",
            title: menuSource.common.breakfast.title,
            main: menuSource.common.breakfast.main,
            extra: menuSource.common.breakfast.extra
          },
          {
            slot: "morningTea",
            title: "Morning tea",
            main: dayMenu.morningTea.main,
            extra: dayMenu.morningTea.extra
          },
          {
            slot: "lunch",
            title: "Lunch",
            main: dayMenu.lunch.main,
            extra: dayMenu.lunch.extra
          },
          {
            slot: "lunchSide",
            title: menuSource.common.lunchSide.title,
            main: menuSource.common.lunchSide.main,
            extra: menuSource.common.lunchSide.extra
          },
          {
            slot: "afternoonTea",
            title: "Afternoon tea",
            main: dayMenu.afternoonTea.main,
            extra: dayMenu.afternoonTea.extra
          },
          {
            slot: "lateSnack",
            title: menuSource.common.lateSnack.title,
            main: menuSource.common.lateSnack.main,
            extra: menuSource.common.lateSnack.extra
          }
        ]
      };
    }

    function updateRoomButtons(){
      document.getElementById("preBtn").classList.toggle("active", currentRoom === "prekinder");
      document.getElementById("kinderBtn").classList.toggle("active", currentRoom === "kinder");
    }

    function render(){
      const now = new Date();
      const viewedDate = addDays(startOfDay(now), viewOffset);
      const data = getMenuForDate(viewedDate, currentRoom);

      document.getElementById("datePill").textContent = formatDate(viewedDate);
      document.getElementById("subtitle").textContent = data.weekend
        ? `${ROOM_LABELS[currentRoom]} • ${prettyWeekdays[viewedDate.getDay()]} • weekend`
        : `${ROOM_LABELS[currentRoom]} • Week ${data.weekNumber} • ${prettyWeekdays[viewedDate.getDay()]}`;

      document.getElementById("footerNote").textContent =
        currentRoom === "kinder"
          ? "Kinder is currently using the same menu data as Pre-Kinder. Replace KINDER_MENU later with the actual Kinder schedule."
          : "Breakfast, lunch side and late snack are standard weekday items from the menu board.";

      const content = document.getElementById("content");

      if(data.weekend){
        content.innerHTML = renderWeekend();
        return;
      }

      const cards = data.meals.map(meal => {
        const state = getMealState(meal.slot, viewedDate, now);
        return renderMealCard(meal.slot, meal.title, meal.main, meal.extra, state);
      }).join("");

      content.innerHTML = `<div class="menu-list">${cards}</div>`;
    }

    document.getElementById("prevBtn").addEventListener("click", () => {
      viewOffset -= 1;
      render();
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      viewOffset += 1;
      render();
    });

    document.getElementById("preBtn").addEventListener("click", () => {
      currentRoom = "prekinder";
      updateRoomButtons();
      render();
    });

    document.getElementById("kinderBtn").addEventListener("click", () => {
      currentRoom = "kinder";
      updateRoomButtons();
      render();
    });

    updateRoomButtons();
    render();
  </script>
</body>
</html>
